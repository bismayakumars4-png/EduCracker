# Render Blueprint Configuration
# Use this file to deploy to Render via CLI or Git integration
# Learn more: https://render.com/docs/blueprints

services:
  - type: web
    name: educracker-backend
    runtime: node
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: educracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
      - key: OPENAI_API_KEY
      - key: GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
      - key: GOOGLE_CALLBACK_URL
        value: https://educracker-backend.onrender.com/api/user/auth/google/callback
      - key: STRIPE_SECRET_KEY
      - key: STRIPE_PUBLISHABLE_KEY
      - key: STRIPE_WEBHOOK_SECRET
      - key: FRONTEND_URL
        value: https://educracker-backend.onrender.com

databases:
  - name: educracker-db
    plan: free
    databaseName: educracker
    user: educracker
