<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EduCracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <img src="../logo.png" alt="EduCracker" class="logo-img">
                    <span class="logo-text">EduCracker</span>
                </a>
                <h1 class="auth-title">Create your account</h1>
                <p class="auth-subtitle">Start your journey to exam success</p>
            </div>
            
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName" class="form-label">First Name</label>
                        <input 
                            type="text" 
                            id="firstName" 
                            name="firstName" 
                            class="form-input" 
                            placeholder="John"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input 
                            type="text" 
                            id="lastName" 
                            name="lastName" 
                            class="form-input" 
                            placeholder="Doe"
                            required
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="john@example.com"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Create a strong password"
                            required
                            minlength="8"
                        >
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText">Password strength</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            class="form-input" 
                            placeholder="Confirm your password"
                            required
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="role" class="form-label">I am a</label>
                    <select id="role" name="role" class="form-select" required>
                        <option value="">Select your role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                
                <label class="checkbox-label terms-checkbox">
                    <input type="checkbox" name="terms" id="terms" required>
                    <span class="checkbox-custom"></span>
                    I agree to the 
                    <a href="#" class="auth-link">Terms of Service</a> 
                    and 
                    <a href="#" class="auth-link">Privacy Policy</a>
                </label>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Create Account
                </button>
            </form>
            
            <div class="auth-divider">
                <span>or continue with</span>
            </div>
            
            <div class="social-login">
                <button class="social-btn">
                    <span class="social-icon">G</span>
                    Google
                </button>
                <button class="social-btn">
                    <span class="social-icon">f</span>
                    Facebook
                </button>
            </div>
            
            <p class="auth-footer">
                Already have an account? 
                <a href="login.html" class="auth-link">Sign in</a>
            </p>
        </div>
        
        <div class="auth-visual">
            <div class="visual-content">
                <h2>Join EduCracker Today</h2>
                <p>Get access to premium exam preparation resources</p>
                <div class="visual-features">
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Free Account Creation</span>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Access to Questions</span>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Progress Tracking</span>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>24/7 Support</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
