<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduCracker</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <img src="../logo.png" alt="EduCracker" class="logo-img">
                    <span class="logo-text">EduCracker</span>
                </a>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to continue your learning journey</p>
            </div>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label" for="remember">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="checkbox-custom"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Sign In
                </button>
            </form>
            
            <div class="auth-divider">
                <span>or continue with</span>
            </div>
            
            <div class="social-login">
                <button class="social-btn" id="googleSignInBtn">
                    <span class="social-icon">G</span>
                    Google
                </button>
                <button class="social-btn">
                    <span class="social-icon">f</span>
                    Facebook
                </button>
            </div>
            
            <p class="auth-footer">
                Don't have an account? 
                <a href="register.html" class="auth-link">Create one</a>
            </p>
        </div>
        
        <div class="auth-visual">
            <div class="visual-content">
                <h2>Continue Learning</h2>
                <p>Access your personalized dashboard and track your progress</p>
                <div class="visual-features">
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Practice Questions</span>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Performance Analytics</span>
                    </div>
                    <div class="visual-feature">
                        <span class="feature-check">✓</span>
                        <span>Study Materials</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Google Sign-In Handler
        document.getElementById('googleSignInBtn').addEventListener('click', function() {
            // Redirect to Google OAuth endpoint
            const backendUrl = 'http://localhost:5000';
            window.location.href = `${backendUrl}/api/user/auth/google`;
        });

        // Check for OAuth callback parameters
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');
            const googleAuth = urlParams.get('googleAuth');

            if (token) {
                // Store token and redirect to dashboard
                localStorage.setItem('token', token);
                localStorage.setItem('isLoggedIn', 'true');
                if (googleAuth === 'true') {
                    localStorage.setItem('googleAuth', 'true');
                }
                window.location.href = 'dashboard.html';
            }

            if (error) {
                alert('Authentication failed. Please try again.');
            }
        });
    </script>
</body>
</html>
